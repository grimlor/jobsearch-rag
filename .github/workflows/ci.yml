name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        if: matrix.python-version == '3.13'
        run: uv run ruff check src/ tests/

      - name: Type check with mypy
        if: matrix.python-version == '3.13'
        run: uv run mypy src/

      - name: Run tests with coverage
        run: uv run pytest --cov=jobsearch_rag --cov-report=term-missing --cov-report=json

      - name: Extract coverage percentage
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.13'
        run: |
          COVERAGE=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          echo "COVERAGE_PCT=$COVERAGE" >> $GITHUB_ENV

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main' && matrix.python-version == '3.13'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: b6bda813bb4ef28ff592b6c81a09c791
          filename: jobsearch-rag-coverage.json
          label: coverage
          message: ${{ env.COVERAGE_PCT }}%
          valColorRange: ${{ env.COVERAGE_PCT }}
          minColorRange: 50
          maxColorRange: 100
